<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const userProfile = {
  username: " CoolUser99 ",
  bio: " I LOVE coding! JavaScript is Great!!! "
};

function cleanUserBio(profile) {
  const cleanedUsername = profile.username.trim().toLowerCase();
  const cleanedBio = profile.bio
    .trim()
    .toLowerCase()
    .replaceAll("javascript", "JS");

  return {
    username: cleanedUsername,
    bio: cleanedBio,
    bioLength: cleanedBio.length
  };
}

console.log(cleanUserBio(userProfile));

    </script>
</body>
</html>
